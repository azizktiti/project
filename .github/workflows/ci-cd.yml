name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build images EXACTLY as in docker-compose
      - name: Build Angular Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

      - name: Build Spring Boot Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app ./springboot/app

      # 5️⃣ Push images
      - name: Push Angular Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Push Spring Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      # 6️⃣ Run docker-compose test
      - name: Start application with Docker Compose
        run: |
          docker-compose up -d
          sleep 30
          docker ps